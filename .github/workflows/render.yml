name: render README Arcade

on:
  workflow_dispatch:
    inputs:
      user:
        description: "Optional GitHub login override"
        required: false
        type: string
  schedule:
    - cron: "17 4 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "dist/**"

permissions:
  contents: write

concurrency:
  group: readme-arcade-render
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Render SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          README_ARCADE_USER: ${{ github.event.inputs.user }}
        run: python scripts/render.py --config readme-arcade.config.json --out-dir dist

      - name: Commit generated SVG
        run: |
          if git diff --quiet -- dist; then
            echo "No generated changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/readme-arcade.svg dist/readme-arcade-dark.svg
          git commit -m "Update README Arcade SVG"
          git push
